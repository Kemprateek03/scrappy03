{% extends 'core/base.html' %}
{% block title %}Sign In — scrappy{% endblock %}
{% block content %}
<div class="landing-page">
    <div class="landing-box">
        <div class="landing-logo">scrappy<span>.</span></div>
        <div class="landing-tagline">Sign in to connect with your world.</div>
        <form method="post" style="text-align:left;">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            {% if form.errors %}
            <div class="alert alert-error">Invalid username or password.</div>
            {% endif %}
            <button type="submit" class="btn btn-primary" style="width:100%;padding:10px;font-size:15px;">Sign In</button>
        </form>
        <p style="margin-top:14px;font-size:13px;color:#666;">New to scrappy? <a href="{% url 'register' %}">Create an account</a></p>
    </div>
</div>
{% endblock %}
