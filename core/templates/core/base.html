<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}scrappy Clone{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e8750a;
            --primary-dark: #c4620a;
            --secondary: #4a90d9;
            --bg: #d6e4f0;
            --card: #ffffff;
            --sidebar: #dce9f5;
            --border: #b8cfe0;
            --text: #1a2b3c;
            --text-muted: #5a7a8a;
            --accent: #f5a623;
            --success: #27ae60;
            --danger: #e74c3c;
            --nav-bg: #173f5f;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Lato', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        a { color: var(--secondary); text-decoration: none; }
        a:hover { text-decoration: underline; color: var(--primary); }

        /* NAV */
        .navbar {
            background: var(--nav-bg);
            padding: 0 20px;
            display: flex;
            align-items: center;
            height: 52px;
            gap: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .navbar .logo {
            font-family: 'Nunito', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        .navbar .logo span { color: var(--accent); }
        .navbar .search-bar {
            flex: 1;
            max-width: 380px;
            display: flex;
            gap: 6px;
        }
        .navbar .search-bar input {
            flex: 1;
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            font-size: 13px;
            outline: none;
        }
        .navbar .search-bar button {
            background: var(--accent);
            border: none;
            border-radius: 20px;
            padding: 6px 14px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
        }
        .navbar .nav-links {
            display: flex;
            gap: 6px;
            margin-left: auto;
        }
        .navbar .nav-links a {
            color: #cde;
            font-size: 13px;
            text-decoration: none;
            padding: 4px 10px;
            border-radius: 4px;
            transition: background 0.15s;
        }
        .navbar .nav-links a:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .navbar .nav-links a.btn-orange {
            background: var(--primary);
            color: #fff;
            font-weight: 700;
        }
        .navbar .nav-links a.btn-orange:hover { background: var(--primary-dark); }

        /* LAYOUT */
        .page-container {
            max-width: 960px;
            margin: 18px auto;
            padding: 0 12px;
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 14px;
        }
        .page-container.no-sidebar { grid-template-columns: 1fr; max-width: 700px; }
        .page-container.wide { grid-template-columns: 200px 1fr 220px; max-width: 1100px; }

        /* SIDEBAR */
        .sidebar { display: flex; flex-direction: column; gap: 10px; }
        .sidebar-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .sidebar-card .sidebar-title {
            background: var(--nav-bg);
            color: #fff;
            font-family: 'Nunito', sans-serif;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .sidebar-card ul { list-style: none; padding: 6px 0; }
        .sidebar-card ul li a {
            display: block;
            padding: 5px 12px;
            font-size: 13px;
            color: var(--text);
            transition: background 0.1s;
        }
        .sidebar-card ul li a:hover { background: #eef4fa; text-decoration: none; color: var(--primary); }

        /* CARDS */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .card-header {
            background: linear-gradient(135deg, #2c6fa8 0%, #1a4a7a 100%);
            color: #fff;
            padding: 8px 14px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-header a { color: #aed; font-size: 12px; font-weight: 400; }
        .card-body { padding: 14px; }

        /* PROFILE HEADER */
        .profile-header {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .profile-avatar {
            width: 90px;
            height: 90px;
            border-radius: 8px;
            object-fit: cover;
            border: 3px solid var(--border);
            background: var(--sidebar);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: var(--text-muted);
            flex-shrink: 0;
            overflow: hidden;
        }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-info h1 { font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 800; }
        .profile-info .meta { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
        .profile-stats { display: flex; gap: 16px; margin-top: 8px; }
        .profile-stats .stat { font-size: 13px; }
        .profile-stats .stat strong { color: var(--primary); font-size: 15px; }

        /* BUTTONS */
        .btn {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 5px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all 0.15s;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); color: #fff; text-decoration: none; }
        .btn-secondary { background: var(--secondary); color: #fff; }
        .btn-secondary:hover { background: #357bb5; color: #fff; text-decoration: none; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover { background: var(--sidebar); text-decoration: none; }

        /* FORMS */
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--text-muted); }
        .form-control {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border 0.15s;
        }
        .form-control:focus { border-color: var(--secondary); }
        textarea.form-control { resize: vertical; }
        .form-group select.form-control { background: #fff; }
        .errorlist { color: var(--danger); font-size: 12px; list-style: none; margin-top: 3px; }

        /* SCRAP */
        .scrap {
            border-bottom: 1px solid #eef;
            padding: 10px 0;
        }
        .scrap:last-child { border-bottom: none; }
        .scrap .scrap-author { font-weight: 700; font-size: 13px; }
        .scrap .scrap-content { font-size: 14px; margin-top: 3px; }
        .scrap .scrap-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

        /* FRIENDS GRID */
        .friends-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 8px;
        }
        .friend-thumb { text-align: center; font-size: 11px; }
        .friend-thumb .avatar {
            width: 54px;
            height: 54px;
            border-radius: 6px;
            background: var(--sidebar);
            margin: 0 auto 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--text-muted);
            overflow: hidden;
        }
        .friend-thumb .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .friend-thumb a { color: var(--text); font-size: 11px; }

        /* COMMUNITY */
        .community-card {
            display: flex;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #eef;
            align-items: flex-start;
        }
        .community-card:last-child { border-bottom: none; }
        .community-icon {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            background: var(--sidebar);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            overflow: hidden;
        }
        .community-icon img { width: 100%; height: 100%; object-fit: cover; }

        /* PHOTO GRID */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
        }
        .photo-item img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 6px;
            border: 2px solid var(--border);
        }

        /* ALERTS */
        .alert {
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .alert-success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .alert-error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        .alert-info { background: #d1ecf1; border: 1px solid #bee5eb; color: #0c5460; }

        /* TABS */
        .tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 14px; }
        .tab {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            color: var(--text-muted);
        }
        .tab.active { border-bottom-color: var(--primary); color: var(--primary); }

        /* FOOTER */
        footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            padding: 20px;
            margin-top: 20px;
        }

        /* LANDING */
        .landing-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #173f5f 0%, #2c6fa8 60%, #e8750a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .landing-box {
            background: #fff;
            border-radius: 12px;
            padding: 40px;
            max-width: 440px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .landing-logo {
            font-family: 'Nunito', sans-serif;
            font-size: 48px;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 4px;
        }
        .landing-logo span { color: var(--primary); }
        .landing-tagline { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }

        .notification-badge {
            background: var(--danger);
            color: #fff;
            border-radius: 10px;
            font-size: 10px;
            padding: 1px 5px;
            margin-left: 4px;
            font-weight: 700;
        }
    </style>
</head>
<body>
{% if user.is_authenticated %}
<nav class="navbar">
    <a href="{% url 'home' %}" class="logo">scrappy<span>.</span></a>
    <div class="search-bar">
        <form action="{% url 'search' %}" method="get" style="display:flex;gap:6px;width:100%">
            <input type="text" name="q" placeholder="Search people..." value="{{ request.GET.q }}">
            <button type="submit">Search</button>
        </form>
    </div>
    <div class="nav-links">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'profile' user.username %}">Profile</a>
        <a href="{% url 'community_list' %}">Communities</a>
        <a href="{% url 'album_list' username=user.username %}">Photos</a>
        <a href="{% url 'logout' %}" class="btn-orange">Sign Out</a>
    </div>
</nav>
{% endif %}

{% if messages %}
<div style="max-width:960px;margin:10px auto;padding:0 12px;">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
</div>
{% endif %}

{% block content %}{% endblock %}

<footer>
    <p>scrappy Clone &copy; 2024 &mdash; Built with Django &mdash; A nostalgic social network</p>
</footer>
</body>
</html>
