{% extends 'core/base.html' %}
{% block title %}Create Album — scrappy{% endblock %}
{% block content %}
<div class="page-container no-sidebar">
    <div class="card">
        <div class="card-header">📁 Create New Album</div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="form-group">
                    <label>{{ field.label }}</label>
                    {{ field }}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary">Create Album</button>
                <a href="{% url 'album_list' username=user.username %}" class="btn btn-outline" style="margin-left:8px;">Cancel</a>
            </form>
        </div>
    </div>
</div>
<style>.form-group input,.form-group textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:5px;font-size:14px;font-family:inherit;}</style>
{% endblock %}
